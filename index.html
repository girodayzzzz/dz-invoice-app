<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SaaS Invoice Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app fade-in">
      <aside class="panel form-panel">
        <header class="panel-header">
          <h1>Invoice Studio</h1>
          <p>Create polished invoices instantly.</p>
        </header>

        <form id="invoice-form" novalidate>
          <div class="control-card">
            <h2>Template & Actions</h2>
            <div class="field-group">
              <label for="templateSelect">Template</label>
              <select id="templateSelect" name="templateSelect">
                <option value="minimal">Minimal</option>
                <option value="modern">Modern</option>
                <option value="bold">Bold</option>
              </select>
            </div>
            <div class="button-grid two-col">
              <button id="autoNumberBtn" class="btn btn-secondary" type="button">Auto-generate #</button>
              <button id="clearInvoiceBtn" class="btn btn-secondary" type="button">Clear Invoice</button>
              <button id="duplicateInvoiceBtn" class="btn btn-secondary" type="button">Duplicate Invoice</button>
              <button id="newInvoiceBtn" class="btn btn-secondary" type="button">New Invoice</button>
            </div>
          </div>

          <div class="field-group">
            <label for="businessName">Business Name</label>
            <input id="businessName" name="businessName" type="text" placeholder="Your company" />
          </div>

          <div class="field-group">
            <label for="clientName">Client Name</label>
            <input id="clientName" name="clientName" type="text" placeholder="Client or company" />
          </div>

          <div class="field-row">
            <div class="field-group">
              <label for="invoiceNumber">Invoice #</label>
              <input id="invoiceNumber" name="invoiceNumber" type="text" readonly />
            </div>
            <div class="field-group">
              <label for="invoiceDate">Date</label>
              <input id="invoiceDate" name="invoiceDate" type="date" />
            </div>
          </div>

          <div class="field-group">
            <label for="logoInput">Logo Upload</label>
            <input id="logoInput" name="logoInput" type="file" accept="image/*" />
          </div>

          <div class="button-grid">
            <button id="saveBusinessProfileBtn" class="btn btn-secondary" type="button">Save Business Profile</button>
            <button id="saveInvoiceFileBtn" class="btn btn-secondary" type="button">Save Invoice</button>
            <label class="btn btn-secondary file-btn" for="loadInvoiceFileInput">Load Invoice</label>
            <input id="loadInvoiceFileInput" type="file" accept="application/json" hidden />
          </div>

          <div class="field-row">
            <div class="field-group">
              <label for="currency">Currency</label>
              <select id="currency" name="currency">
                <option value="USD">USD ($)</option>
                <option value="EUR">EUR (€)</option>
                <option value="GBP">GBP (£)</option>
              </select>
            </div>
            <div class="field-group">
              <label for="taxRate">Tax (%)</label>
              <input id="taxRate" name="taxRate" type="number" min="0" step="0.01" placeholder="0" />
            </div>
          </div>

          <div class="field-row">
            <div class="field-group">
              <label for="discountValue">Discount</label>
              <input
                id="discountValue"
                name="discountValue"
                type="number"
                min="0"
                step="0.01"
                placeholder="0"
              />
            </div>
            <div class="field-group">
              <label for="discountType">Discount Type</label>
              <select id="discountType" name="discountType">
                <option value="percent">Percent (%)</option>
                <option value="fixed">Fixed Amount</option>
              </select>
            </div>
          </div>

          <div class="items-header">
            <h2>Line Items</h2>
            <button id="addItemBtn" class="btn btn-secondary" type="button">+ Add Item</button>
          </div>

          <div id="itemsContainer" class="items-container"></div>

          <div class="saved-invoices control-card">
            <div class="items-header saved-header">
              <h2>Saved Invoices</h2>
              <button id="saveCurrentInvoiceBtn" class="btn btn-secondary" type="button">Save Current Invoice</button>
            </div>
            <div id="savedInvoicesList" class="saved-invoices-list"></div>
          </div>

          <div class="actions">
            <button id="downloadBtn" class="btn btn-primary sticky-download" type="button" disabled>
              Download Invoice
            </button>
          </div>
        </form>
      </aside>

      <section class="panel preview-panel">
        <div id="invoice-preview" class="invoice-preview template-minimal">
          <div class="invoice-top">
            <img id="previewLogo" class="preview-logo hidden" alt="Business logo" />
            <div class="invoice-meta">
              <p id="previewInvoiceNo">Invoice #</p>
              <p id="previewDate">Date</p>
            </div>
          </div>

          <div class="invoice-party">
            <div>
              <h3>From</h3>
              <p id="previewBusiness">Your Business Name</p>
            </div>
            <div>
              <h3>Bill To</h3>
              <p id="previewClient">Client Name</p>
            </div>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Description</th>
                  <th>Price</th>
                </tr>
              </thead>
              <tbody id="previewItems"></tbody>
            </table>
          </div>

          <div class="totals-card">
            <div class="invoice-total-row">
              <span>Subtotal</span>
              <strong id="previewSubtotal">$0.00</strong>
            </div>
            <div class="invoice-total-row">
              <span id="previewDiscountLabel">Discount</span>
              <strong id="previewDiscount">-$0.00</strong>
            </div>
            <div class="invoice-total-row">
              <span id="previewTaxLabel">Tax (0%)</span>
              <strong id="previewTax">$0.00</strong>
            </div>
            <div class="invoice-total invoice-total-grand">
              <span>Total</span>
              <strong id="previewTotal">$0.00</strong>
            </div>
          </div>

          <p class="invoice-watermark">Generated by DZ Media</p>
        </div>
      </section>
    </div>

    <div id="toast" class="toast" aria-live="polite">Invoice downloaded successfully.</div>

    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
